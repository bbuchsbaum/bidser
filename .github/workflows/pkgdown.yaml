# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      pages: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set site library path
        run: |
          site_library="${RUNNER_TEMP}/R/site-library"
          mkdir -p "${site_library}"
          echo "R_LIBS_SITE=${site_library}" >> "$GITHUB_ENV"
        shell: bash

      - name: Install albersdown from CRAN
        run: |
          install.packages(
            "albersdown",
            repos = "https://cran.r-project.org",
            lib = Sys.getenv("R_LIBS_SITE")
          )
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          lockfile-create-lib: Sys.getenv("R_LIBS_SITE")
          needs: website

      - name: Build site
        run: |
          .libPaths(c(Sys.getenv("R_LIBS_SITE"), .libPaths()))
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Enable GitHub Pages
        if: github.event_name != 'pull_request'
        run: |
          gh api repos/${{ github.repository }}/pages \
            --method POST --input - <<'EOF' || true
          {"source":{"branch":"gh-pages","path":"/"}}
          EOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          clean: false
          branch: gh-pages
          folder: docs
